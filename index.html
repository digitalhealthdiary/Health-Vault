<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA / App identity -->
    <title>HealthVault</title>
    <meta name="description" content="Your personal health tracking, medication reminders, and medical records app." />
    <meta name="application-name" content="HealthVault" />
    <meta name="theme-color" content="#2563EB" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-512.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA standalone mode -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HealthVault" />

    <!-- Open Graph (nice share preview) -->
    <meta property="og:title" content="HealthVault" />
    <meta property="og:description" content="Track health vitals, medications, and medical records." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
